name: Release Gate

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  scope-live-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,security]"
      - name: Optional SCOPE sibling checkout
        if: ${{ secrets.SCOPE_REPO_URL != '' }}
        env:
          SCOPE_REPO_URL: ${{ secrets.SCOPE_REPO_URL }}
        run: |
          git clone --depth 1 "$SCOPE_REPO_URL" scope-sibling
          echo "SCOPE_REPO_PATH=$GITHUB_WORKSPACE/scope-sibling" >> $GITHUB_ENV
      - name: Sync SCOPE contract fixtures
        env:
          SCOPE_REPO_PATH: ${{ env.SCOPE_REPO_PATH || vars.SCOPE_REPO_PATH }}
        run: |
          if [ -n "$SCOPE_REPO_PATH" ]; then
            python scripts/sync_scope_contract_fixtures.py --scope-repo "$SCOPE_REPO_PATH"
          else
            echo "SCOPE_REPO_PATH not set; using pinned fixtures"
          fi
      - name: SCOPE live chain (python-import)
        env:
          SCOPE_REPO_PATH: ${{ env.SCOPE_REPO_PATH || vars.SCOPE_REPO_PATH }}
        run: |
          if [ -z "$SCOPE_REPO_PATH" ]; then
            echo "SKIP: SCOPE_REPO_PATH not configured"
            exit 0
          fi
          python scripts/verify_scope_live_chain.py --scope-repo "$SCOPE_REPO_PATH" --mode python-import
      - name: SCOPE live chain (cli)
        env:
          SCOPE_CLI: scope
        run: |
          if ! command -v scope >/dev/null 2>&1; then
            echo "SKIP: scope CLI not installed"
            exit 0
          fi
          python scripts/verify_scope_live_chain.py --mode cli
      - name: SCOPE live chain (akta-review)
        env:
          SCOPE_CLI: scope
          SCOPE_CLI_MODE: akta-review
        run: |
          if ! command -v scope >/dev/null 2>&1; then
            echo "SKIP: scope CLI not installed"
            exit 0
          fi
          python scripts/verify_scope_live_chain.py --mode akta-review
      - name: Pilot bundle generate and verify
        env:
          SCOPE_REPO_PATH: ${{ env.SCOPE_REPO_PATH || vars.SCOPE_REPO_PATH }}
        run: |
          make demo-pilot-bundle
          make verify-pilot-bundle
      - name: Strict SCOPE contract cross-repo demo
        env:
          SCOPE_REPO_PATH: ${{ env.SCOPE_REPO_PATH || vars.SCOPE_REPO_PATH }}
          AKTA_STRICT_SCOPE_CONTRACT: "1"
        run: |
          if [ -z "$SCOPE_REPO_PATH" ]; then
            echo "SKIP: strict cross-repo requires SCOPE_REPO_PATH"
            exit 0
          fi
          make demo-reconstructable-cross-repo
          make verify-reconstructable-cross-repo
      - name: Upload pilot bundle artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: pilot-bundle
          path: dist/pilot_bundle/

  sibling-live-matrix:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || vars.PF_CORE_REPO_PATH != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,security]"
      - name: PF runtime proof
        env:
          PF_CORE_REPO_PATH: ${{ vars.PF_CORE_REPO_PATH }}
        run: |
          if [ -n "$PF_CORE_REPO_PATH" ]; then
            python scripts/demo_pf_runtime_proof.py
          else
            echo "SKIP: PF_CORE_REPO_PATH not set"
          fi
      - name: PCS-Core live ingest
        env:
          PCS_CORE_REPO_PATH: ${{ vars.PCS_CORE_REPO_PATH }}
        run: |
          pytest tests/contracts/test_pcs_core_live_ingest.py -v -m integration || \
            pytest tests/contracts/test_pcs_core_live_ingest.py -v
      - name: PCS-Bench external harness
        env:
          PCS_BENCH_REPO_PATH: ${{ vars.PCS_BENCH_REPO_PATH }}
        run: |
          if [ -z "$PCS_BENCH_REPO_PATH" ]; then
            echo "SKIP: PCS_BENCH_REPO_PATH not set"
            exit 0
          fi
          python -c "
          from adapters.pcs_bench.runner import run_pcs_bench_suite
          from pathlib import Path
          import json
          report = run_pcs_bench_suite('scenarios/canonical_5.jsonl', 'scenarios/expected_decisions.jsonl')
          Path('evals/reports').mkdir(parents=True, exist_ok=True)
          Path('evals/reports/pcs_bench_live.json').write_text(json.dumps(report, indent=2))
          assert report.get('passed'), report
          "
      - name: VSA contract validation
        env:
          VSA_REPO_PATH: ${{ vars.VSA_REPO_PATH }}
        run: |
          if [ -z "$VSA_REPO_PATH" ]; then
            echo "SKIP: VSA_REPO_PATH not set"
            exit 0
          fi
          pytest tests/contracts/test_vsa_live_contract.py -v -m integration
      - name: Scientific Memory round-trip
        env:
          MEMORY_REPO_PATH: ${{ vars.MEMORY_REPO_PATH }}
        run: |
          if [ -z "$MEMORY_REPO_PATH" ]; then
            echo "SKIP: MEMORY_REPO_PATH not set"
            exit 0
          fi
          pytest tests/contracts/test_scientific_memory_roundtrip.py -v -m integration

  eval-bench-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,security]"
      - name: AKTA-Bench v1 eval suite
        run: make eval-bench-v1
