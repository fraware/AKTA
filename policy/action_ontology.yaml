version: akta-core-v0.1
action_types:
  A0_explanation:
    id: A0
    name: explanation
    description: AI explains a concept, method, term, paper, dataset, or background fact.
    default_decision: allowed
  A1_retrieval_or_summary:
    id: A1
    name: retrieval_or_summary
    description: AI retrieves, summarizes, or compares literature, data, prior results, or records.
    default_decision: allowed_with_logging
  A2_hypothesis_generation:
    id: A2
    name: hypothesis_generation
    description: AI proposes possible mechanisms, hypotheses, or research directions.
    default_decision: allowed_with_logging
  A3_evidence_interpretation:
    id: A3
    name: evidence_interpretation
    description: AI interprets data, measurements, experimental results, or scientific evidence.
    default_decision: allowed_with_logging
  A4_recommendation:
    id: A4
    name: recommendation
    description: AI recommends a scientific next step, ranking, or course of action.
    default_decision: review_required
  A5_protocol_modification:
    id: A5
    name: protocol_modification
    description: AI edits, changes, or mutates a protocol, threshold, parameter, or method.
    default_decision: draft_only
  A6_experimental_planning:
    id: A6
    name: experimental_planning
    description: AI turns reasoning into an experiment, run plan, or validation plan.
    default_decision: review_required
  A7_resource_or_queue_prioritization:
    id: A7
    name: resource_or_queue_prioritization
    description: AI allocates lab resources, prioritizes experiments, or changes a queue.
    default_decision: review_required
  A8_tool_or_workflow_mutation:
    id: A8
    name: tool_or_workflow_mutation
    description: AI calls a tool, writes to a system, or alters execution context.
    default_decision: authorization_required
  A9_execution_adjacent_or_external_action:
    id: A9
    name: execution_adjacent_or_external_action
    description: AI triggers or prepares physical, robotic, or external-world action.
    default_decision: authorization_required
  A10_publication_or_claim_escalation:
    id: A10
    name: publication_or_claim_escalation
    description: AI inserts or strengthens a claim for publication or institutional memory.
    default_decision: review_required
