    mutates_state: true
    external_effect: false
    default_permission: review_required
    action_family: compute

  data_catalog.register:
    action_type: A8_tool_or_workflow_mutation
    mutates_state: true
    external_effect: false
    default_permission: review_required
    action_family: workflow
